<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>اختبار API</title>
</head>
<body>
<h1>اختبار API</h1>
<button onclick="addTask()">add new task</button>
<div id="out"></div>

<script>
const API = 'https://api-himb.onrender.com/tasks';

async function loadTasks() {
  const res = await fetch(API);
  const tasks = await res.json();
  const out = document.getElementById('out');
  
  if(tasks.length === 0){
    out.innerHTML = '<p>لا يوجد مهام</p>';
    return;
  }

  out.innerHTML = tasks.map(t => `
    <div style="margin: 5px 0; padding: 5px; border: 1px solid #ccc;">
      ${t.id} - ${t.title} - ${t.done ? 'تم' : 'لا'}
      <button onclick="deleteTask(${t.id})">حذف</button>
    </div>
  `).join('');
}

async function addTask() {
  await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: 'مهمة من المتصفح' })
  });
  loadTasks(); 
}

// لازم تستقبل id هنا
async function deleteTask(id) { 
  await fetch(`${API}/${id}`, { method: 'DELETE' });
  loadTasks(); 
}

loadTasks(); // هذا يخليه يجيب الداتا لحاله
</script>
</body>
</html>
